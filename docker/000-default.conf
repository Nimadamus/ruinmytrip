<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>
    # Block direct web access to app internals (defense in depth; they're outside docroot anyway).
    <DirectoryMatch "/var/www/html/(app|views|database|docker|scripts)">
        Require all denied
    </DirectoryMatch>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
